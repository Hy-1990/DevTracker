name: Staple macOS release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Draft release tag
        required: true
        default: v0.1.2
      asset:
        description: Notarized DMG asset name
        required: true
        default: DevTracker_0.1.2_universal.dmg

permissions:
  contents: write

concurrency:
  group: staple-macos-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  staple-and-verify:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
      ASSET: ${{ inputs.asset }}
    steps:
      - name: Download notarized draft asset
        run: |
          set -euo pipefail
          mkdir artifact
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET" \
            --dir artifact

      - name: Staple Apple notarization ticket
        run: |
          set -euo pipefail
          dmg="artifact/$ASSET"
          for attempt in {1..6}; do
            if xcrun stapler staple "$dmg" >/dev/null 2>&1; then
              xcrun stapler validate "$dmg" >/dev/null
              exit 0
            fi
            if [[ "$attempt" -lt 6 ]]; then
              echo "Ticket unavailable; retrying in 20 seconds ($attempt/6)."
              sleep 20
            fi
          done
          echo "Unable to staple the Apple notarization ticket." >&2
          exit 1

      - name: Verify signed Universal DMG
        run: |
          set -euo pipefail
          dmg="artifact/$ASSET"
          mount_dir=$(mktemp -d /tmp/devtracker-release.XXXXXX)
          mounted=0
          cleanup() {
            if [[ "$mounted" -eq 1 ]]; then
              hdiutil detach "$mount_dir" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          hdiutil verify "$dmg" >/dev/null
          codesign --verify --strict "$dmg"
          xcrun stapler validate "$dmg" >/dev/null
          spctl --assess --type open --context context:primary-signature "$dmg"

          hdiutil attach -readonly -nobrowse -mountpoint "$mount_dir" "$dmg" >/dev/null
          mounted=1
          app="$mount_dir/DevTracker.app"
          test -d "$app"
          codesign --verify --deep --strict "$app"
          spctl --assess --type execute "$app"

          architectures=$(lipo -archs "$app/Contents/MacOS/devtracker")
          [[ " $architectures " == *" arm64 "* ]]
          [[ " $architectures " == *" x86_64 "* ]]

          blocked=$(find "$app" -type f \
            \( -iname '*.db' -o -iname '*.sqlite' -o -iname '*.sqlite3' \
               -o -iname '.env' -o -iname '*.pem' -o -iname '*.key' \) -print)
          [[ -z "$blocked" ]]

      - name: Replace draft asset with stapled DMG
        run: |
          set -euo pipefail
          cd artifact
          shasum -a 256 "$ASSET" >"$ASSET.sha256"
          gh release upload "$TAG" \
            "$ASSET" \
            "$ASSET.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
